id: d-team
kind: bundle
name: "D-Team"
source:
  registry: github
  repo: "chemistrywow31/D-Team"
  url: "https://github.com/chemistrywow31/D-Team"
use_cases:
  - structured-dev-workflow
  - backend-development
  - frontend-development
  - code-review
  - testing
  - devops
stacks: []
weight: medium
contains:
  - kind: agent
    count: 14
  - kind: skill
    count: 12
  - kind: rule
    count: 6
requires:
  tools: []
  mcp_servers: []
  runtime:
    - "openspec"
    - "gsd-skill"
lotus:
  tier: recommended
  notes: "Pre-built 14-agent dev team covering full SDLC. Requires OpenSpec CLI + GSD skill."
  conflicts_with:
    - superpowers
    - gstack
  pairs_well_with:
    - a-team
    - o-team
benchmarks:
  - scenario: s1-go-crud-api
    tokens_in: 12000
    tokens_out: 8000
    wall_time_seconds: 50
    quality_score: 4.5
  - scenario: s3-greenfield-bootstrap
    tokens_in: 5000
    tokens_out: 3000
    wall_time_seconds: 20
    quality_score: 3.8
