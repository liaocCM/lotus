id: gstack
kind: bundle
name: "gstack"
source:
  registry: github
  repo: "garrytan/gstack"
  url: "https://github.com/garrytan/gstack"
use_cases:
  - structured-dev-workflow
  - planning
  - build
  - qa
  - shipping
  - retrospective
stacks: []
weight: heavy
contains:
  - kind: skill
    count: 20
  - kind: daemon
    count: 1
requires:
  tools: []
  mcp_servers: []
  runtime:
    - "bun>=1.0"
    - playwright
lotus:
  tier: alternative
  notes: "Virtual eng team workflow: plan -> build -> QA -> ship -> retro. Requires bun and playwright."
  conflicts_with:
    - superpowers
  pairs_well_with: []
benchmarks:
  - scenario: s1-go-crud-api
    tokens_in: 15000
    tokens_out: 10000
    wall_time_seconds: 60
    quality_score: 4.2
  - scenario: s2-react-feature
    tokens_in: 14000
    tokens_out: 9000
    wall_time_seconds: 55
    quality_score: 3.8
